# ===========================================
# PWM Explorer — explorer.pwm.platformai.org
# Reverse proxy to Docker app on 127.0.0.1:3000
# (next.js + fastapi + sqlite indexer, all bundled)
# ===========================================
server {
    server_name explorer.pwm.platformai.org;

    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 32M;

    # The explorer is read-only; a generous but not unlimited body size
    # is plenty. All writes go through `pwm-node` CLI, not the web UI.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Next.js RSC uses websockets/SSE in some views; leave upgrade headers.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Long-tail: the SQLite indexer can hold a request for a moment on
        # first hit after a cold restart. 60s is generous; the app typically
        # responds in < 200ms.
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/explorer.pwm.platformai.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/explorer.pwm.platformai.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = explorer.pwm.platformai.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name explorer.pwm.platformai.org;
    return 404; # managed by Certbot


}