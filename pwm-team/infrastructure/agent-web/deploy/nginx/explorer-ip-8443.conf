# ===========================================
# PWM Explorer — IP + alternate-port listener
# https://34.63.169.185:8443/  →  127.0.0.1:3000
#
# Purpose: UTSW network blocks the hostname
# `explorer.pwm.platformai.org` via the McAfee
# web filter, but reaches the VM by IP. This
# block exposes the explorer on the IP at port
# 8443 so UTSW collaborators can open it the
# same way they reach the aiXiv site at
# https://34.63.169.185/.
#
# Cert is the existing explorer.pwm.platformai.org
# certificate; browsers accessing by IP will warn
# about cert/host mismatch (same as aiXiv at IP),
# user clicks Advanced → Proceed.
# ===========================================
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name 34.63.169.185 _;

    include /etc/nginx/snippets/security-headers.conf;

    ssl_certificate     /etc/letsencrypt/live/explorer.pwm.platformai.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.pwm.platformai.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Next.js RSC / SSE
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
